name: Figma Change Watch

on:
  schedule:
    - cron: '*/30 * * * *'  # runs every 30 minutes
  workflow_dispatch:          # allows manual trigger from the GitHub Actions UI

jobs:
  check-figma:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Figma watch
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node figma-watch/index.js

      - name: Commit updated snapshot
        run: |
          git config user.name "figma-watch-bot"
          git config user.email "bot@noreply.com"
          git pull --rebase origin main
          git add figma-watch/snapshot.json
          git diff --staged --quiet || git commit -m "chore: update figma snapshot [skip ci]"
          git push
