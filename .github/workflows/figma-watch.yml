name: Figma Change Watch

on:
  schedule:
    - cron: '*/20 * * * *'  # runs every 20 minutes
  workflow_dispatch:          # allows manual trigger from the GitHub Actions UI

jobs:
  check-figma:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: figma-watch/snapshot.json
          key: figma-snapshot-${{ github.run_id }}
          restore-keys: figma-snapshot-

      - name: Run Figma watch
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # Per-team Slack webhook URLs — add one per entry in config.json
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node figma-watch/index.js
